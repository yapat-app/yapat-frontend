services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yapat-frontend
    ports:
      - "3000:80"
    environment:
      # Backend API URL 
      - VITE_YAPAT_BACKEND_URL=${VITE_YAPAT_BACKEND_URL:-http://localhost:8000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
