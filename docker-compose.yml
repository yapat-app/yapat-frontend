services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yapat-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_YAPAT_BACKEND_URL=${VITE_YAPAT_BACKEND_URL:-http://localhost:8000}
      - VITE_STUDY_LOGGING_ENABLED=${VITE_STUDY_LOGGING_ENABLED:-0}
      - VITE_STUDY_PHASE=${VITE_STUDY_PHASE:-}
      - VITE_STUDY_PHASE_LOCK=${VITE_STUDY_PHASE_LOCK:-0}
      - VITE_STUDY_PHASE_ALLOWED=${VITE_STUDY_PHASE_ALLOWED:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
